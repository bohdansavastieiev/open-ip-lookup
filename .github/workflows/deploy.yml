name: Test, Build, Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: bohdansavastieiev/open-ip-lookup

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

  build:
    name: Build and push image
    runs-on: ubuntu-24.04-arm
    needs: test

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build

    concurrency:
      group: production-open-ip-lookup
      cancel-in-progress: false

    permissions:
      contents: read

    steps:
      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/open_ip_lookup_deploy_key
          chmod 600 ~/.ssh/open_ip_lookup_deploy_key

          VPS_PORT="${{ secrets.VPS_PORT }}"
          if [ -z "$VPS_PORT" ]; then
            VPS_PORT="22"
          fi

          ssh-keyscan -p "$VPS_PORT" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy
        shell: bash
        run: |
          set -euo pipefail

          VPS_PORT="${{ secrets.VPS_PORT }}"
          if [ -z "$VPS_PORT" ]; then
            VPS_PORT="22"
          fi

          ssh -i ~/.ssh/open_ip_lookup_deploy_key \
            -p "$VPS_PORT" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'set -euo pipefail
             cd /opt/open-ip-lookup
             git fetch origin master
             git reset --hard origin/master
             docker compose -f docker-compose.deploy.yml pull
             docker compose -f docker-compose.deploy.yml up -d --remove-orphans
             docker image prune -f'
